<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f14">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="icon" href="{{ url_for('static', filename='icon.svg') }}?v={{ app_version }}" type="image/svg+xml">
    <link rel="shortcut icon" href="{{ url_for('root_favicon') }}?v={{ app_version }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}?v={{ app_version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v={{ app_version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/today.css') }}?v={{ app_version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/feature_pages.css') }}?v={{ app_version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/meal.css') }}?v={{ app_version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/analysis.css') }}?v={{ app_version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}?v={{ app_version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/rules.css') }}?v={{ app_version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ui_rebuild.css') }}?v={{ app_version }}">
    <title>{% block title %}피트니스 트래커{% endblock %}</title>
  </head>
  <body class="admin-mode account-user">
    <div id="app">
      <header class="header">
        <div class="header-title">피트니스 트래커</div>
        <div class="header-meta" title="업데이트 {{ app_updated_at }}">
          <span class="account-greeting">{{ current_account.display_name or current_account.username if current_account else "사용자" }}님 환영합니다</span>
          <span class="app-version">{{ app_version }}</span>
        </div>
      </header>
      <nav class="tabs" aria-label="사용자 메뉴">
        <a class="tab-btn {% if active_page == 'today' %}active{% endif %}" href="{{ url_for('index') }}">오늘</a>
        <a class="tab-btn {% if active_page in ['daily', 'search'] %}active{% endif %}" href="{{ url_for('daily_summary_page') }}">기록</a>
        <a class="tab-btn {% if active_page in ['weekly', 'monthly', 'yearly', 'exercises', 'pr', 'equipment'] %}active{% endif %}" href="{{ url_for('weekly_summary_page') }}">분석</a>
        <a class="tab-btn {% if active_page == 'meals' %}active{% endif %}" href="{{ url_for('meal_weekly_page') }}">식단</a>
        <a class="tab-btn {% if active_page in ['more', 'library', 'plans', 'calendar'] %}active{% endif %}" href="{{ url_for('more_page') }}">더보기</a>
        <a class="tab-btn {% if active_page == 'settings' %}active{% endif %}" href="{{ url_for('settings_page') }}">설정</a>
        <form method="post" action="{{ url_for('logout_route') }}" class="tab-logout-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button class="tab-btn" type="submit">로그아웃</button>
        </form>
      </nav>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
    <script src="{{ url_for('static', filename='js/dom_data.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/pwa.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/select_theme.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/readiness.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/timers.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/offline_queue.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/workout_tools.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/ui_interactions.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/notifications.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/meal_entry.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/form_submit.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/app_boot.js') }}?v={{ app_version }}"></script>
    <script src="{{ url_for('static', filename='js/workout_entry.js') }}?v={{ app_version }}"></script>
  </body>
</html>
