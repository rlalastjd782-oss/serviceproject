{% extends "layouts/base.html" %}

{% block title %}설정{% endblock %}

{% block content %}
  <section class="section settings-panel">
    <div class="section-header">
      <div>
        <h1 class="section-title">설정</h1>
        <div class="section-subtitle">비밀번호 변경 · 내 설정 진입 비밀번호만 변경합니다. 데이터, QA, 앱 운영 기능은 관리자 페이지에서 관리합니다.</div>
      </div>
      {% if has_settings_password %}
        <form method="post" action="{{ url_for('lock_settings_route') }}">
          <button class="btn-small" type="submit">잠그기</button>
        </form>
      {% endif %}
    </div>
    {% if error == "password" %}
      <div class="empty compact-empty">비밀번호는 4자 이상이고 확인값과 같아야 합니다.</div>
    {% endif %}
    <form method="post" action="{{ url_for('save_settings_password_route') }}" class="settings-password-form">
      <input name="password" type="password" autocomplete="new-password" placeholder="새 비밀번호">
      <input name="password_confirm" type="password" autocomplete="new-password" placeholder="새 비밀번호 확인">
      <button class="btn-primary" type="submit">{% if has_settings_password %}비밀번호 변경{% else %}비밀번호 설정{% endif %}</button>
    </form>
  </section>
{% endblock %}
