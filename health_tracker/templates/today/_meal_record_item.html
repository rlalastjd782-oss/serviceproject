<div class="ex-item editable-list-item meal-record-item">
  <div class="item-read-view ex-item-info">
    <div class="ex-name">
      {{ item.food_name }}
      {% if item.quantity is not none %}<span class="muted-text"> · {{ "%.0f"|format(item.quantity) }}개</span>{% endif %}
      {% if item.grams is not none %}<span class="muted-text"> · {{ "%.1f"|format(item.grams) }}g</span>{% endif %}
      {% if item.calories is not none %}<span class="muted-text"> · {{ "%.0f"|format(item.calories) }}kcal</span>{% endif %}
    </div>
  </div>
  <form method="post" action="{{ url_for('update_meal', meal_id=item.id) }}" class="inline-edit-form meal-edit-form">
    <input type="hidden" name="mode" value="meal">
    <input name="food_name" value="{{ item.food_name }}" required>
    <input name="quantity" type="number" min="0" step="1" inputmode="numeric" value="{% if item.quantity is not none %}{{ "%.0f"|format(item.quantity) }}{% endif %}" placeholder="개">
    <input name="grams" type="number" min="0" step="0.1" inputmode="decimal" value="{% if item.grams is not none %}{{ "%.1f"|format(item.grams) }}{% endif %}" placeholder="g">
    <input name="calories" type="number" min="0" step="1" inputmode="numeric" value="{% if item.calories is not none %}{{ "%.0f"|format(item.calories) }}{% endif %}" placeholder="kcal">
    <button type="submit" class="btn-small">저장</button>
  </form>
  <div class="item-actions">
    <button type="button" class="btn-small" data-toggle-edit>수정</button>
    <form method="post" action="{{ url_for('delete_meal', meal_id=item.id) }}">
      <input type="hidden" name="mode" value="meal">
      <button type="submit" class="btn-danger" aria-label="식단 삭제">×</button>
    </form>
  </div>
</div>
