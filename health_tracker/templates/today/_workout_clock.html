<section class="section workout-clock-section workout-only" data-workout-clock data-workout-date="{{ session.workout_date }}" data-workout-mode="{% if workout_mode %}1{% else %}0{% endif %}" data-initial-duration="{{ session.duration_seconds or 0 }}" data-duration-url="{{ url_for('update_session_duration_route', session_id=session.id) }}">
  <div class="section-header">
    <div>
      <div class="section-title">운동 시간</div>
      <div class="section-subtitle">시작을 누른 뒤 저장하면 운동시간에 반영됩니다.</div>
    </div>
    <div class="workout-clock-display" data-workout-clock-display>00:00:00</div>
  </div>
  <div class="timer-actions">
    <button class="btn-small" type="button" data-workout-clock-start>시작</button>
    <button class="btn-small" type="button" data-workout-clock-pause>일시정지</button>
    <button class="btn-primary" type="button" data-workout-clock-save>저장</button>
    <button class="btn-danger" type="button" data-workout-clock-reset>초기화</button>
  </div>
  <div class="workout-save-status" data-workout-clock-status>저장 대기</div>
  <details class="duration-manual-edit">
    <summary>시간 직접 수정</summary>
    <form method="post" action="{{ url_for('update_session_duration_route', session_id=session.id) }}" class="duration-edit-form">
      <input type="hidden" name="mode" value="{% if workout_mode %}workout{% endif %}">
      <label>
        <span>운동 시간</span>
        <input name="duration_hours" type="number" min="0" inputmode="numeric" value="{{ duration_hours(session.duration_seconds) }}" aria-label="운동 시간">
      </label>
      <label>
        <span>분</span>
        <input name="duration_minutes" type="number" min="0" max="59" inputmode="numeric" value="{{ duration_minutes(session.duration_seconds) }}" aria-label="운동 분">
      </label>
      <button class="btn-small" type="submit">수정</button>
      <button class="btn-danger" type="submit" name="action" value="reset">시간 삭제</button>
    </form>
  </details>
</section>
