<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f14">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>{% block title %}헬스 트래커{% endblock %}</title>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="header-title">🏋️ 헬스 트래커</div>
        <div class="app-version" title="업데이트 {{ app_updated_at }}">{{ app_version }}</div>
      </header>
      <nav class="tabs" aria-label="주요 메뉴">
        <a class="tab-btn {% if active_page == 'today' %}active{% endif %}" href="{{ url_for('index') }}">오늘</a>
        <a class="tab-btn {% if active_page == 'daily' %}active{% endif %}" href="{{ url_for('daily_summary_page') }}">기록</a>
        <a class="tab-btn {% if active_page == 'search' %}active{% endif %}" href="{{ url_for('record_search_page') }}">검색</a>
        <a class="tab-btn {% if active_page == 'weekly' %}active{% endif %}" href="{{ url_for('weekly_summary_page') }}">주별</a>
        <a class="tab-btn {% if active_page == 'monthly' %}active{% endif %}" href="{{ url_for('monthly_summary_page') }}">월별</a>
        <a class="tab-btn {% if active_page == 'exercises' %}active{% endif %}" href="{{ url_for('exercise_summary_page') }}">운동</a>
        <a class="tab-btn {% if active_page == 'pr' %}active{% endif %}" href="{{ url_for('pr_summary_page') }}">PR</a>
        <a class="tab-btn {% if active_page == 'equipment' %}active{% endif %}" href="{{ url_for('equipment_summary_page') }}">장비</a>
        <a class="tab-btn {% if active_page == 'meals' %}active{% endif %}" href="{{ url_for('meal_weekly_page') }}">식단</a>
        <a class="tab-btn {% if active_page == 'calendar' %}active{% endif %}" href="{{ url_for('calendar_page') }}">달력</a>
        <a class="tab-btn {% if active_page == 'settings' %}active{% endif %}" href="{{ url_for('settings_page') }}">설정</a>
      </nav>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
